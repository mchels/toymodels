<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <!-- Background -->
  <rect width="1280" height="800" fill="#0D0D0D"/>

  <!-- Title -->
  <text x="640" y="40" text-anchor="middle" font-family="Calibri, sans-serif" font-size="32" fill="#BFBFBF">Rust Raw Pointers Cheat-sheet</text>
  <text x="640" y="62" text-anchor="middle" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">⚠ LLM-generated, unreviewed - verify before trusting</text>

  <!-- ==================== POINTER TYPES (Left Column) ==================== -->
  <text x="150" y="90" text-anchor="middle" font-family="Calibri, sans-serif" font-size="20" fill="#818181">Pointer Types</text>

  <!-- *const T -->
  <rect x="50" y="110" width="200" height="40" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="150" y="137" text-anchor="middle" font-family="monospace" font-size="18">
    <tspan fill="#BFBFBF">*const T</tspan>
  </text>
  <text x="260" y="137" font-family="Calibri, sans-serif" font-size="14" fill="#818181">immutable raw pointer</text>

  <!-- *mut T -->
  <rect x="50" y="160" width="200" height="40" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="150" y="187" text-anchor="middle" font-family="monospace" font-size="18">
    <tspan fill="#BFBFBF">*mut T</tspan>
  </text>
  <text x="260" y="187" font-family="Calibri, sans-serif" font-size="14" fill="#818181">mutable raw pointer</text>

  <!-- NonNull<T> -->
  <rect x="50" y="210" width="200" height="40" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="150" y="237" text-anchor="middle" font-family="monospace" font-size="18">
    <tspan fill="#BFBFBF">NonNull&lt;T&gt;</tspan>
  </text>
  <text x="260" y="237" font-family="Calibri, sans-serif" font-size="14" fill="#818181">non-null, covariant</text>

  <!-- fn pointer -->
  <rect x="50" y="260" width="200" height="40" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="150" y="287" text-anchor="middle" font-family="monospace" font-size="18">
    <tspan fill="#BFBFBF">fn(T) -&gt; U</tspan>
  </text>
  <text x="260" y="287" font-family="Calibri, sans-serif" font-size="14" fill="#818181">function pointer (no capture)</text>

  <!-- ==================== CONVERSIONS (Center) ==================== -->
  <text x="640" y="90" text-anchor="middle" font-family="Calibri, sans-serif" font-size="20" fill="#818181">Conversions</text>

  <!-- Reference to Pointer -->
  <rect x="480" y="110" width="320" height="80" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="640" y="135" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Reference → Pointer</text>
  <text x="500" y="160" font-family="monospace" font-size="14" fill="#BFBFBF">&amp;x as *const T</text>
  <text x="500" y="180" font-family="monospace" font-size="14" fill="#BFBFBF">&amp;mut x as *mut T</text>
  <text x="720" y="170" font-family="Calibri, sans-serif" font-size="13" fill="#818181">safe, no copy</text>

  <!-- Pointer to Reference -->
  <rect x="480" y="200" width="320" height="80" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="640" y="225" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Pointer → Reference</text>
  <text x="780" y="225" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">unsafe</text>
  <text x="500" y="250" font-family="monospace" font-size="14" fill="#BFBFBF">&amp;*ptr</text>
  <text x="600" y="250" font-family="monospace" font-size="14" fill="#818181">// reborrow</text>
  <text x="500" y="270" font-family="monospace" font-size="14" fill="#BFBFBF">&amp;mut *ptr</text>

  <!-- Address to Pointer -->
  <rect x="480" y="290" width="320" height="50" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="640" y="315" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Address → Pointer</text>
  <text x="500" y="333" font-family="monospace" font-size="14" fill="#BFBFBF">addr as *const T</text>
  <text x="720" y="333" font-family="Calibri, sans-serif" font-size="13" fill="#818181">safe</text>

  <!-- Box conversions -->
  <rect x="480" y="350" width="320" height="80" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="640" y="375" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Box ↔ Pointer</text>
  <text x="500" y="400" font-family="monospace" font-size="14" fill="#BFBFBF">Box::into_raw(b)</text>
  <text x="680" y="400" font-family="Calibri, sans-serif" font-size="13" fill="#818181">→ *mut T, safe</text>
  <text x="500" y="420" font-family="monospace" font-size="14" fill="#BFBFBF">Box::from_raw(ptr)</text>
  <text x="680" y="420" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">unsafe</text>

  <!-- NonNull conversions -->
  <rect x="480" y="440" width="320" height="70" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="640" y="465" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">NonNull ↔ Pointer</text>
  <text x="500" y="488" font-family="monospace" font-size="14" fill="#BFBFBF">NonNull::new(ptr)</text>
  <text x="680" y="488" font-family="Calibri, sans-serif" font-size="13" fill="#818181">→ Option, safe</text>
  <text x="500" y="505" font-family="monospace" font-size="14" fill="#BFBFBF">nn.as_ptr()</text>
  <text x="680" y="505" font-family="Calibri, sans-serif" font-size="13" fill="#818181">→ *mut T, safe</text>

  <!-- ==================== OPERATIONS (Right Column) ==================== -->
  <text x="1050" y="90" text-anchor="middle" font-family="Calibri, sans-serif" font-size="20" fill="#818181">Operations</text>

  <!-- Dereference -->
  <rect x="900" y="110" width="300" height="60" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="1050" y="135" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Dereference</text>
  <text x="1150" y="135" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">unsafe</text>
  <text x="920" y="158" font-family="monospace" font-size="14" fill="#BFBFBF">*ptr</text>
  <text x="1000" y="158" font-family="Calibri, sans-serif" font-size="13" fill="#818181">read/write value</text>

  <!-- Field Access -->
  <rect x="900" y="180" width="300" height="60" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="1050" y="205" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Field Access</text>
  <text x="1150" y="205" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">unsafe</text>
  <text x="920" y="228" font-family="monospace" font-size="14" fill="#BFBFBF">(*ptr).field</text>
  <text x="1060" y="228" font-family="Calibri, sans-serif" font-size="13" fill="#818181">dereference + access</text>

  <!-- Offset -->
  <rect x="900" y="250" width="300" height="80" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="1050" y="275" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Pointer Arithmetic</text>
  <text x="920" y="298" font-family="monospace" font-size="14" fill="#BFBFBF">ptr.add(n)</text>
  <text x="1060" y="298" font-family="Calibri, sans-serif" font-size="13" fill="#818181">+n elements, safe</text>
  <text x="920" y="318" font-family="monospace" font-size="14" fill="#BFBFBF">ptr.offset(n)</text>
  <text x="1060" y="318" font-family="Calibri, sans-serif" font-size="13" fill="#818181">signed offset, safe</text>

  <!-- Cast -->
  <rect x="900" y="340" width="300" height="60" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="1050" y="365" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Type Cast</text>
  <text x="920" y="388" font-family="monospace" font-size="14" fill="#BFBFBF">ptr as *const U</text>
  <text x="1100" y="388" font-family="Calibri, sans-serif" font-size="13" fill="#818181">safe</text>

  <!-- Read/Write -->
  <rect x="900" y="410" width="300" height="80" fill="none" stroke="#606060" stroke-width="1"/>
  <text x="1050" y="435" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" fill="#BFBFBF">Explicit Read/Write</text>
  <text x="1170" y="435" font-family="Calibri, sans-serif" font-size="13" fill="#C00000">unsafe</text>
  <text x="920" y="458" font-family="monospace" font-size="14" fill="#BFBFBF">ptr.read()</text>
  <text x="920" y="478" font-family="monospace" font-size="14" fill="#BFBFBF">ptr.write(val)</text>
  <text x="1060" y="468" font-family="Calibri, sans-serif" font-size="13" fill="#818181">move semantics</text>

  <!-- ==================== SAFETY INVARIANTS (Bottom) ==================== -->
  <text x="640" y="550" text-anchor="middle" font-family="Calibri, sans-serif" font-size="20" fill="#BFBFBF">Safety Invariants</text>
  <text x="640" y="570" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#818181">required for dereference / read / write</text>

  <rect x="100" y="585" width="1080" height="100" fill="none" stroke="#606060" stroke-dasharray="4" stroke-width="1"/>

  <!-- Invariant boxes -->
  <rect x="120" y="600" width="150" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="195" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">Valid</text>
  <text x="195" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">points to allocated</text>
  <text x="195" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">memory</text>

  <rect x="290" y="600" width="150" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="365" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">Aligned</text>
  <text x="365" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">addr % align_of::&lt;T&gt;()</text>
  <text x="365" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">== 0</text>

  <rect x="460" y="600" width="150" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="535" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">Initialized</text>
  <text x="535" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">memory contains</text>
  <text x="535" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">valid T</text>

  <rect x="630" y="600" width="150" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="705" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">Non-aliasing</text>
  <text x="705" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">for &amp;mut: no other</text>
  <text x="705" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">refs exist</text>

  <rect x="800" y="600" width="150" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="875" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">In-bounds</text>
  <text x="875" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">within allocation</text>
  <text x="875" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">(for arithmetic)</text>

  <rect x="970" y="600" width="190" height="60" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="1065" y="625" text-anchor="middle" font-family="Calibri, sans-serif" font-size="14" fill="#BFBFBF">Lifetime valid</text>
  <text x="1065" y="645" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">data not dropped/moved</text>
  <text x="1065" y="657" text-anchor="middle" font-family="Calibri, sans-serif" font-size="12" fill="#818181">(borrow checker won't help)</text>

  <!-- ==================== COMMON PATTERNS (Bottom) ==================== -->
  <text x="640" y="710" text-anchor="middle" font-family="Calibri, sans-serif" font-size="20" fill="#818181">Common Patterns</text>

  <!-- Pattern boxes -->
  <rect x="50" y="725" width="280" height="55" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="65" y="750" font-family="monospace" font-size="13" fill="#BFBFBF">slice::from_raw_parts(ptr, len)</text>
  <text x="65" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#818181">create slice from pointer</text>
  <text x="280" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#C00000">unsafe</text>

  <rect x="350" y="725" width="280" height="55" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="365" y="750" font-family="monospace" font-size="13" fill="#BFBFBF">ptr::copy_nonoverlapping(s,d,n)</text>
  <text x="365" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#818181">memcpy (no overlap allowed)</text>
  <text x="570" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#C00000">unsafe</text>

  <rect x="650" y="725" width="280" height="55" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="665" y="750" font-family="monospace" font-size="13" fill="#BFBFBF">&amp;(*nn.as_ptr()).field</text>
  <text x="665" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#818181">field ref through NonNull</text>
  <text x="870" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#C00000">unsafe</text>

  <rect x="950" y="725" width="280" height="55" fill="none" stroke="#505050" stroke-width="1"/>
  <text x="965" y="750" font-family="monospace" font-size="13" fill="#BFBFBF">ptr.read_unaligned()</text>
  <text x="965" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#818181">read without alignment req</text>
  <text x="1170" y="770" font-family="Calibri, sans-serif" font-size="12" fill="#C00000">unsafe</text>

  <!-- Footer -->
  <text x="30" y="795" font-family="Calibri, sans-serif" font-size="12" fill="#606060">rust_pointers learning project</text>
</svg>
